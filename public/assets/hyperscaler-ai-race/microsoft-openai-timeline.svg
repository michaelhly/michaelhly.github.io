<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Microsoft and OpenAI relationship timeline</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Timeline from 2019 to 2026: Microsoft invests about 13 billion dollars in OpenAI, Azure is OpenAI's exclusive cloud provider from 2019 to 2024, the 2025 restructuring gives Microsoft a 27 percent stake and 20 percent revenue share while ending exclusivity, OpenAI then signs Oracle, AWS, and Google deals, and by March 2026 the two are neighbors in Abilene with separate compute plans.</desc>
